
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Bingo Solidario</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding-top: 50px;">



    <div style="background-color: white; width: 350px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 8px rgba(0,0,0,0.1);">
        <h2 style="color: #333;">Crear Cuenta</h2>
        
        <!-- El método POST es obligatorio para enviar datos sensibles (contraseñas) -->
        <form method="POST" style="text-align: left;">
            
            {% csrf_token %} <!-- Llave de seguridad contra ataques externos -->
            
            {{ formulario.as_p }} <!-- Django dibuja los campos de texto aquí -->
            
            <button type="submit" style="background-color: #28a745; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px;">
                Registrarme
            </button>
        </form>
    </div>



</body>
</html>
